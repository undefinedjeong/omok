<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오목 게임</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f1e8;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      margin: 16px 0 8px;
      font-size: 24px;
    }

    #gameCanvas {
      background: #d9a441;
      border: 2px solid #333;
      touch-action: none;
    }

    .button-area {
      width: 100%;
      max-width: 420px;
      display: flex;
      gap: 8px;
      padding: 12px;
      box-sizing: border-box;
    }

    button {
      flex: 1;
      padding: 14px 8px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #333;
      color: white;
    }

    button:active {
      background: #555;
    }

    #status {
      margin-top: 8px;
      font-size: 16px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>오목 게임</h1>

  <canvas id="gameCanvas"></canvas>

  <div id="status">1단계: 오목판 표시</div>

  <div class="button-area">
    <button onclick="resetGame()">다시 시작</button>
    <button onclick="changeMode()">AI 모드</button>
    <button onclick="showHelp()">도움말</button>
  </div>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const boardSize = 15;
    const margin = 24;

    let canvasSize;
    let cellSize;

    function setupCanvas() {
      const maxWidth = Math.min(window.innerWidth - 24, 420);

      canvasSize = maxWidth;
      canvas.width = canvasSize;
      canvas.height = canvasSize;

      cellSize = (canvasSize - margin * 2) / (boardSize - 1);

      drawBoard();
    }

    function drawBoard() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#d9a441";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.strokeStyle = "#222";
      ctx.lineWidth = 1;

      for (let i = 0; i < boardSize; i++) {
        const pos = margin + i * cellSize;

        // 세로선
        ctx.beginPath();
        ctx.moveTo(pos, margin);
        ctx.lineTo(pos, canvasSize - margin);
        ctx.stroke();

        // 가로선
        ctx.beginPath();
        ctx.moveTo(margin, pos);
        ctx.lineTo(canvasSize - margin, pos);
        ctx.stroke();
      }

      drawStarPoints();
    }

    function drawStarPoints() {
      const starPoints = [
        [3, 3],
        [7, 3],
        [11, 3],
        [3, 7],
        [7, 7],
        [11, 7],
        [3, 11],
        [7, 11],
        [11, 11],
      ];

      ctx.fillStyle = "#222";

      for (const [x, y] of starPoints) {
        ctx.beginPath();
        ctx.arc(
          margin + x * cellSize,
          margin + y * cellSize,
          4,
          0,
          Math.PI * 2
        );
        ctx.fill();
      }
    }

    function resetGame() {
      document.getElementById("status").textContent = "게임을 다시 시작했습니다.";
      drawBoard();
    }

    function changeMode() {
      document.getElementById("status").textContent = "AI 모드는 다음 단계에서 구현합니다.";
    }

    function showHelp() {
      document.getElementById("status").textContent =
        "오목은 가로, 세로, 대각선으로 돌 5개를 연결하면 승리합니다.";
    }

    window.addEventListener("resize", setupCanvas);

    setupCanvas();
  </script>
</body>
</html>
