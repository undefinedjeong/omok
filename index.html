<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오목 게임</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f1e8;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      margin: 16px 0 8px;
      font-size: 24px;
    }

    #gameCanvas {
      background: #d9a441;
      border: 2px solid #333;
      touch-action: none;
    }

    .button-area {
      width: 100%;
      max-width: 420px;
      display: flex;
      gap: 8px;
      padding: 12px;
      box-sizing: border-box;
    }

    button {
      flex: 1;
      padding: 14px 8px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #333;
      color: white;
    }

    button:active {
      background: #555;
    }

    #status {
      margin-top: 8px;
      font-size: 16px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>오목 게임</h1>

  <canvas id="gameCanvas"></canvas>

  <div id="status">1단계: 오목판 표시</div>

  <div class="button-area">
    <button onclick="resetGame()">다시 시작</button>
    <button onclick="changeMode()">AI 모드</button>
    <button onclick="showHelp()">도움말</button>
  </div>

    <script>
      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");
    
      const boardSize = 15;
      const margin = 24;
      const EMPTY = 0;
      const BLACK = 1;
      const WHITE = 0;
    
      let canvasSize;
      let cellSize;
      let board = Array.from({ length: boardSize }, () =>
        Array(boardSize).fill(EMPTY)
      );
      let currentTurn = BLACK; //흑 선
    
      function setupCanvas() {
        const maxWidth = Math.min(window.innerWidth - 24, 420);
    
        canvasSize = maxWidth;
        canvas.width = canvasSize;
        canvas.height = canvasSize;
    
        cellSize = (canvasSize - margin * 2) / (boardSize - 1);
    
        drawGame();
      }
    
      function drawGame() {
        drawBoard();
        drawStones();
      }
    
      function drawBoard() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    
        ctx.fillStyle = "#d9a441";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    
        ctx.strokeStyle = "#222";
        ctx.lineWidth = 1;
    
        for (let i = 0; i < boardSize; i++) {
          const pos = margin + i * cellSize;
    
          ctx.beginPath();
          ctx.moveTo(pos, margin);
          ctx.lineTo(pos, canvasSize - margin);
          ctx.stroke();
    
          ctx.beginPath();
          ctx.moveTo(margin, pos);
          ctx.lineTo(canvasSize - margin, pos);
          ctx.stroke();
        }
    
        drawStarPoints();
      }
    
      function drawStarPoints() {
        const starPoints = [
          [3, 3],
          [7, 3],
          [11, 3],
          [3, 7],
          [7, 7],
          [11, 7],
          [3, 11],
          [7, 11],
          [11, 11],
        ];
    
        ctx.fillStyle = "#222";
    
        for (const [x, y] of starPoints) {
          ctx.beginPath();
          ctx.arc(
            margin + x * cellSize,
            margin + y * cellSize,
            4,
            0,
            Math.PI * 2
          );
          ctx.fill();
        }
      }
    
      function drawStones() {
        for (let y = 0; y < boardSize; y++) {
          for (let x = 0; x < boardSize; x++) {
            if (board[y][x] !== EMPTY) {
              drawStone(x, y, board[y][x]);
            }
          }
        }
      }
    
      function drawStone(x, y, color) {
        const centerX = margin + x * cellSize;
        const centerY = margin + y * cellSize;
        const radius = cellSize * 0.4;
    
        ctx.beginPath();
        ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
    
        if (color === BLACK) {
          ctx.fillStyle = "#111";
        }
        else if (color === WHITE) {
          ctx.fillStyle = "#f5f5f5"
        }
    
        ctx.fill();
      }
    
      function handleCanvasInput(event) {
        event.preventDefault();
    
        const rect = canvas.getBoundingClientRect();
    
        const clientX = event.clientX ?? event.touches?.[0]?.clientX;
        const clientY = event.clientY ?? event.touches?.[0]?.clientY;
    
        const canvasX = clientX - rect.left;
        const canvasY = clientY - rect.top;
    
        const boardX = Math.round((canvasX - margin) / cellSize);
        const boardY = Math.round((canvasY - margin) / cellSize);
    
        if (!isInsideBoard(boardX, boardY)) {
          document.getElementById("status").textContent = "오목판 안쪽을 선택하세요.";
          return;
        }
    
        if (board[boardY][boardX] !== EMPTY) {
          document.getElementById("status").textContent = "이미 돌이 있는 자리입니다.";
          return;
        }
        
        board[boardY][boardX] = currentTurn;
        const turnName = currentTurn === BLACK ? "흑" : "백";
        document.getElementById("status").textContent =
          `{turnName}돌 위치: (${boardX + 1}, ${boardY + 1})`;
    
        drawGame();
      }
    
      function isInsideBoard(x, y) {
        return x >= 0 && x < boardSize && y >= 0 && y < boardSize;
      }
    
      function resetGame() {

        currentTurn = BLACK;
        
        board = Array.from({ length: boardSize }, () =>
          Array(boardSize).fill(EMPTY)
        );
    
        document.getElementById("status").textContent = "게임을 다시 시작했습니다.";
        drawGame();
      }
    
      function changeMode() {
        document.getElementById("status").textContent = "AI 모드는 다음 단계에서 구현합니다.";
      }
    
      function showHelp() {
        document.getElementById("status").textContent =
          "오목판을 터치하면 해당 위치에 돌이 놓입니다.";
      }
    
      canvas.addEventListener("click", handleCanvasInput);
      canvas.addEventListener("touchstart", handleCanvasInput, { passive: false });
    
      window.addEventListener("resize", setupCanvas);
    
      setupCanvas();
    </script>
  </body>
</html>
